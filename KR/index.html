        const GeneratorApp = () => {
            const [data, setData] = useState(DEFAULT_DATA);

                setData(prev => ({ ...prev, flights: newF }));

            const updateDay = (idx, field, value) => {

                    newDays[idx].meals = { ...newDays[idx].meals, ...value };

                }
                if(field === 'location' && CITIES[value]) {

                    day: nextDayNum, date: "", location: "濟州", lat: 33.49, lon: 126.53, spots: [],
                    meals: { b: "", l: "", d: "" }, hotel: "", hotelTel: "", hotelAddress: ""
                });

            const removeDay = (idx) => {

            // PDF Parsing Logic
            const handlePdf = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                
                const url = URL.createObjectURL(file);
                setPdfUrl(url);
                setRightTab('pdf'); 

                setStatus("解析 PDF 資料中...");
                
                const ab = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(ab).promise;
                let fullText = "";
                
                for(let i=1; i<=pdf.numPages; i++) {
                    const p = await pdf.getPage(i);
                    const t = await p.getTextContent();
                    fullText += t.items.map(s => s.str).join(" ") + "\n"; 
                }

                // Remove Entry Card tutorial junk
                if(fullText.includes("電子入境卡填寫教學")) {
                    fullText = fullText.split("電子入境卡填寫教學")[0] + "電子入境卡"; 
                } else if (fullText.includes("填寫網址")) {
                     fullText = fullText.split("填寫網址")[0];
                }

                const newData = {...data};

                // Basic Info
                const codeMatch = fullText.match(/(?:團號|編號)[:：\s]*([A-Z0-9]+)/i);
                if(codeMatch) newData.tripCode = codeMatch[1].trim();

                const nameLines = fullText.split('\n').slice(0, 5);
                const nameMatch = nameLines.find(l => (l.includes("旅遊") || l.includes("天")) && !l.includes("全方位"));
                if(nameMatch) newData.tripName = nameMatch.trim();

                const guideMatch = fullText.match(/領隊[:：\s]*([^\s0-9]+)/);

                const phoneMatch = fullText.match(/(09\d{2}-?\d{6})/);
                if(phoneMatch) newData.guide.twPhone = phoneMatch[1].trim();

                const meetTimeMatch = fullText.match(/集合時間[:：\s]*([^\n]+)/);

                const meetLocMatch = fullText.match(/集合地點[:：\s]*([^\n]+)/);
                if(meetLocMatch) newData.meeting.location = meetLocMatch[1].trim();
                
                const staffMatch = fullText.match(/機場送機人員[:：\s]*([^\n]+)/);
                if(staffMatch) newData.meeting.airportStaff = staffMatch[1].trim();

                // Flights
                const flightRegex = /([A-Z]{2}\s?\d{3,4})\s*(\d{2}:\d{2}.\d{2}:\d{2})/g;
                const flightsFound = [...fullText.matchAll(flightRegex)];
                
                if(flightsFound.length > 0) {
                    const f1 = flightsFound[0];
                    const times1 = f1[2].split(/[\/~]/);
                    newData.flights[0] = {
                        type: "去程", airline: getAirlineName(f1[1]), code: f1[1].replace(/\s/g, ''),
                        date: "DAY 1", 
                        depTime: times1[0], depAirport: "桃園",
                        arrTime: times1[1].slice(-5), arrAirport: "濟州"
                    };

                    if(flightsFound.length > 1) {
                        const f2 = flightsFound[1];
                        const times2 = f2[2].split(/[\/~]/);
                        newData.flights[1] = {
                            type: "回程", airline: getAirlineName(f2[1]), code: f2[1].replace(/\s/g, ''),
                            date: "DAY 5",
                            depTime: times2[0], depAirport: "濟州",
                            arrTime: times2[1].slice(-5), arrAirport: "桃園"
                        };
                    }
                }

                // Days Logic
                const dateRegex = /(\d{2}\/\d{2})/g;
                let datesFound = [...fullText.matchAll(dateRegex)].map(m => ({ date: m[1], index: m.index }));
                
                const uniqueDates = [];
                if(datesFound.length > 0) {
                    uniqueDates.push(datesFound[0]);
                    for(let i=1; i<datesFound.length; i++) {
                        if(datesFound[i].index - datesFound[i-1].index > 50 || datesFound[i].date !== datesFound[i-1].date) {
                            uniqueDates.push(datesFound[i]);
                        }
                    }
                }

                if(uniqueDates.length > 0) {
                    const year = new Date().getFullYear();
                    newData.meeting.date = `${year}/${uniqueDates[0].date}`;
                    newData.flights[0].date = uniqueDates[0].date;
                    if(uniqueDates.length > 1) newData.flights[1].date = uniqueDates[uniqueDates.length-1].date;

                    const newDays = [];
                    for(let i=0; i<uniqueDates.length; i++) {
                        const current = uniqueDates[i];
                        const next = uniqueDates[i+1];
                        const startIdx = current.index;
                        const endIdx = next ? next.index : fullText.length;
                        let dayBlock = fullText.substring(startIdx, endIdx);

                        let itineraryText = dayBlock;
                        const spotsRaw = itineraryText.split(/住宿|早餐|中餐|午餐|晚餐/)[0]; 
                        
                        const spots = [];
                        if(spotsRaw.includes('→')) {
                            const rawSpots = spotsRaw.split('→');
                            rawSpots.forEach(s => {
                                let name = s.replace(/\d{2}\/\d{2}|行程內容|【|】/g, '').trim();
                                if(name && name.length > 2 && !name.includes("桃園") && !name.includes("班機時刻")) {
                                    spots.push({ name: name, desc: "" });
                                }
                            });
                        } 
                        const bracketSpots = [...dayBlock.matchAll(/【([^】]+)】/g)];
                        if(bracketSpots.length > 0 && spots.length === 0) {
                             bracketSpots.forEach(m => spots.push({ name: m[1], desc: "" }));
                        }

                        let meals = { b: "", l: "", d: "" };
                        const bMatch = dayBlock.match(/早餐[:：]([^\n]+)/);
                        const lMatch = dayBlock.match(/(?:中餐|午餐)[:：]([^\n]+)/);
                        const dMatch = dayBlock.match(/晚餐[:：]([^\n]+)/);
                        
                        if(bMatch) meals.b = bMatch[1].trim();
                        if(lMatch) meals.l = lMatch[1].trim();
                        if(dMatch) meals.d = dMatch[1].trim();

                        let hotel = "請參閱確認單";
                        let hotelTel = "";
                        const hotelMatch = dayBlock.match(/住宿[:：]([^\n]+)/);
                        if(hotelMatch) {
                            const hotelRaw = hotelMatch[1].trim();
                            const telMatch = hotelRaw.match(/[\d-]{8,}/);
                            if(telMatch) {
                                hotelTel = telMatch[0];
                                hotel = hotelRaw.replace(telMatch[0], '').trim();
                            } else {
                                hotel = hotelRaw;
                            }
                        }

                        newDays.push({
                            day: i + 1,
                            date: current.date,
                            location: "濟州",
                            lat: 33.49, lon: 126.53,
                            spots: spots.length > 0 ? spots : [{ name: "行程豐富", desc: "詳見說明會資料" }],
                            meals: meals,
                            hotel: hotel,
                            hotelTel: hotelTel,
                            hotelAddress: ""
                        });
                    }
                    newData.days = newDays;
                }

                setData(newData);
                setStatus("PDF 解析完成！請檢查並微調內容");
            };
            
            function getAirlineName(code) {
                if(code.includes('IT')) return '台灣虎航';
                if(code.includes('KE')) return '大韓航空';
                if(code.includes('OZ')) return '韓亞航空';
                if(code.includes('LJ')) return '真航空';
                if(code.includes('7C')) return '濟州航空';
                if(code.includes('TW')) return '德威航空';
                return code;
            }

            const download = () => {
                const html = getClientHtml(data);
                const blob = new Blob([html], {type: 'text/html'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `行程App(韓國)_${data.tripName || '未命名'}.html`;
                document.body.appendChild(a);
                a.click();
            };

            return (
                <div className="flex h-screen bg-gray-100">
                    <div className="w-1/2 p-8 overflow-y-auto bg-white shadow-xl z-10">
                        <h1 className="text-3xl font-bold text-gray-800 mb-2">說明會產生器 (全方位版)</h1>
                        <p className="text-sm text-gray-500 mb-6">支援 PDF 自動解析與電子入境卡教學連結</p>

                        <div className="mb-6">
                            <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl">
                                <h3 className="font-bold text-blue-800 mb-2"><i className="fas fa-file-pdf"></i> 上傳說明會資料 (PDF)</h3>
                                <input type="file" accept=".pdf" onChange={handlePdf} className="text-sm w-full" />
                            </div>
                        </div>

                        {status && <div className="bg-yellow-50 text-yellow-700 p-2 rounded mb-4 text-sm text-center font-bold animate-pulse">{status}</div>}

                        <hr className="my-6 border-gray-200" />
                        
                        {/* 須知編輯區 (含入境卡設定) */}
                        <div className="mb-6 border p-4 rounded-xl bg-purple-50">
                            <h3 className="font-bold text-purple-800 mb-2"><i class="fas fa-info-circle"></i> 須知內容編輯</h3>
                            <div className="space-y-3">
                                <div><label className="text-xs font-bold text-gray-500">天氣與穿著</label><textarea rows="2" value={data.info.weather} onChange={e=>updateInfo('weather', e.target.value)} className="w-full border rounded p-1 text-sm"></textarea></div>
                                <div><label className="text-xs font-bold text-gray-500">貨幣匯率</label><textarea rows="2" value={data.info.currency} onChange={e=>updateInfo('currency', e.target.value)} className="w-full border rounded p-1 text-sm"></textarea></div>
                                <div><label className="text-xs font-bold text-gray-500">行李/電壓/禁製品</label><textarea rows="2" value={data.info.baggage} onChange={e=>updateInfo('baggage', e.target.value)} className="w-full border rounded p-1 text-sm"></textarea></div>
                                
                                <div className="p-3 border border-blue-300 bg-blue-50 rounded">
                                    <label className="text-xs font-bold text-blue-700 mb-1 block">電子入境卡設定</label>
                                    <p className="text-[10px] text-gray-500 mb-1">官方申請連結已內建，請填寫教學 PDF 的下載網址。</p>
                                    <input value={data.info.entryCardTutorialUrl} onChange={e=>updateInfo('entryCardTutorialUrl', e.target.value)} className="w-full border p-1 rounded text-sm" placeholder="../韓國電子入境卡.pdf" />
                                </div>

                                <div className="p-2 border border-yellow-300 bg-yellow-50 rounded">
                                    <label className="text-xs font-bold text-yellow-700 mb-1 block">服務費設定</label>
                                    <div className="flex gap-2">
                                        <input type="text" value={data.info.tips.currency} onChange={e=>updateInfo('tips', {...data.info.tips, currency: e.target.value})} className="border p-1 rounded text-xs w-1/3" placeholder="幣別" />
                                        <input type="number" value={data.info.tips.perDay} onChange={e=>updateInfo('tips', {...data.info.tips, perDay: parseInt(e.target.value) || 0})} className="border p-1 rounded text-xs w-1/3" placeholder="每日金額" />
                                        <input type="number" value={data.info.tips.days} onChange={e=>updateInfo('tips', {...data.info.tips, days: parseInt(e.target.value) || 0})} className="border p-1 rounded text-xs w-1/3" placeholder="天數" />
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs font-bold text-gray-500 text-pink-600">圖片網址 / 注意事項圖片</label>
                                    <textarea rows="2" value={data.info.imageRoot} onChange={e=>updateInfo('imageRoot', e.target.value)} className="w-full border border-pink-200 rounded p-1 text-sm text-pink-600" placeholder="imgs/1.jpg"></textarea>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 text-blue-600">紙本說明會 PDF 下載路徑</label>
                                    <input value={data.info.pdfPath} onChange={e=>updateInfo('pdfPath', e.target.value)} className="w-full border border-blue-200 rounded p-1 text-sm text-blue-600" placeholder="briefing.pdf" />
                                </div>
                            </div>
                        </div>

                        {/* 基本資料編輯區 */}
                        <div className="mb-6 border p-4 rounded-xl bg-indigo-50">
                            <h3 className="font-bold text-indigo-800 mb-2">基本資料微調</h3>
                            <div className="mb-3">
                                <label className="text-xs text-gray-500 font-bold block mb-1">團體名稱</label>
                                <input value={data.tripName} onChange={e=>updateData('tripName', e.target.value)} className="border p-1 rounded text-sm w-full font-bold" placeholder="團體名稱" />
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div>
                                    <label className="text-xs text-gray-500 font-bold block mb-1">團號</label>
                                    <input value={data.tripCode} onChange={e=>updateData('tripCode', e.target.value)} className="border p-1 rounded text-sm w-full" placeholder="團號" />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 font-bold block mb-1">出發日期</label>
                                    <input value={data.meeting.date} onChange={e=>updateData('meeting', {...data.meeting, date: e.target.value})} className="border p-1 rounded text-sm w-full" placeholder="YYYY/MM/DD" />
                                </div>
                            </div>
                        </div>
                        
                        {/* 集合資訊編輯區 */}
                        <div className="mb-6 border p-4 rounded-xl bg-gray-50">
                            <h3 className="font-bold text-gray-700 mb-2">集合資訊微調</h3>
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <input value={data.meeting.time} onChange={e=>updateData('meeting', {...data.meeting, time: e.target.value})} className="border p-1 rounded text-sm" placeholder="集合時間" />
                                <input value={data.meeting.badge} onChange={e=>updateData('meeting', {...data.meeting, badge: e.target.value})} className="border p-1 rounded text-sm" placeholder="識別牌顏色" />
                            </div>
                            <textarea value={data.meeting.location} onChange={e=>updateData('meeting', {...data.meeting, location: e.target.value})} className="border p-1 rounded text-sm w-full mb-2 h-16 resize-none" placeholder="集合地點"></textarea>
                            <div className="grid grid-cols-2 gap-2">
                                <input value={data.guide.name} onChange={e=>updateData('guide', {...data.guide, name: e.target.value})} className="border p-1 rounded text-sm w-full" placeholder="領隊姓名" />
                                <input value={data.guide.twPhone} onChange={e=>updateData('guide', {...data.guide, twPhone: e.target.value})} className="border p-1 rounded text-sm w-full" placeholder="領隊電話" />
                            </div>
                            <div className="grid grid-cols-2 gap-2 mt-2">
                                <label className="text-xs text-gray-500 font-bold block mb-1 col-span-2">機場專員</label>
                                <input value={data.meeting.airportStaff} onChange={e=>updateData('meeting', {...data.meeting, airportStaff: e.target.value})} className="border p-1 rounded text-sm w-full col-span-2" placeholder="例如: 曾仁杰 0910-008-139" />
                            </div>
                        </div>

                        {/* 航班詳細編輯區 */}
                        <div className="mb-6 border p-4 rounded-xl bg-blue-50">
                            <h3 className="font-bold text-blue-800 mb-2"><i className="fas fa-plane"></i> 航班資訊詳填</h3>
                            {data.flights.map((f, idx) => (
                                <div key={idx} className="mb-3 border-b pb-2 last:border-0">
                                    <div className="flex justify-between font-bold text-sm mb-1">{f.type}</div>
                                    <div className="grid grid-cols-2 gap-2 text-xs">
                                        <input value={f.code} onChange={e=>updateFlight(idx, 'code', e.target.value)} className="border p-1 rounded font-bold text-blue-600" placeholder="航班代號" />
                                        <input value={f.date} onChange={e=>updateFlight(idx, 'date', e.target.value)} className="border p-1 rounded" placeholder="日期" />
                                        <input value={f.depTime} onChange={e=>updateFlight(idx, 'depTime', e.target.value)} className="border p-1 rounded" placeholder="出發時間" />
                                        <input value={f.depAirport} onChange={e=>updateFlight(idx, 'depAirport', e.target.value)} className="border p-1 rounded" placeholder="出發機場" />
                                        <input value={f.arrTime} onChange={e=>updateFlight(idx, 'arrTime', e.target.value)} className="border p-1 rounded" placeholder="抵達時間" />
                                        <input value={f.arrAirport} onChange={e=>updateFlight(idx, 'arrAirport', e.target.value)} className="border p-1 rounded" placeholder="抵達機場" />
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="space-y-6">
                            {data.days.map((day, dIdx) => (
                                <div key={dIdx} className="border p-4 rounded-xl bg-gray-50 hover:bg-white transition-shadow shadow-sm">
                                    <div className="flex justify-between items-center mb-3 border-b pb-2">
                                        <div className="flex gap-2 items-center flex-1">
                                            <span className="bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold">Day {day.day}</span>
                                            <input value={day.date} onChange={e=>updateDay(dIdx, 'date', e.target.value)} className="border p-1 rounded text-sm w-16 text-center font-bold text-gray-500" placeholder="日期" />
                                            <div className="flex gap-1 flex-1">
                                                <select value={Object.keys(CITIES).find(k=>CITIES[k].lat===day.lat) || ''} onChange={e=>updateDay(dIdx, 'location', e.target.value)} className="border p-1 rounded text-sm bg-orange-50 font-bold text-orange-700 w-24">
                                                    {Object.keys(CITIES).map(c=><option key={c} value={c}>{c}</option>)}
                                                </select>
                                                <input value={day.location} onChange={e=>updateDay(dIdx, 'location', e.target.value)} className="border p-1 rounded text-sm w-full" placeholder="自訂地點" />
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-1 ml-2">
                                            <button onClick={()=>addSpot(dIdx)} className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded hover:bg-green-200"><i className="fas fa-plus"></i></button>
                                            <button onClick={()=>removeDay(dIdx)} className="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200"><i className="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                    
                                    {/* 餐食微調 */}
                                    <div className="grid grid-cols-3 gap-2 mb-3 text-xs">
                                        <div><label className="text-gray-400 block mb-1">早餐</label><input value={day.meals.b} onChange={e=>updateDay(dIdx, 'meals', {...day.meals, b: e.target.value})} className="border p-1 rounded w-full" /></div>
                                        <div><label className="text-gray-400 block mb-1">午餐</label><input value={day.meals.l} onChange={e=>updateDay(dIdx, 'meals', {...day.meals, l: e.target.value})} className="border p-1 rounded w-full" /></div>
                                        <div><label className="text-gray-400 block mb-1">晚餐</label><input value={day.meals.d} onChange={e=>updateDay(dIdx, 'meals', {...day.meals, d: e.target.value})} className="border p-1 rounded w-full" /></div>
                                    </div>

                                    <div className="space-y-3 mb-3">
                                        {day.spots.map((spot, sIdx) => (
                                            <div key={sIdx} className="bg-white border rounded p-3 relative group">
                                                <input value={spot.name} onChange={e=>updateDaySpot(dIdx, sIdx, 'name', e.target.value)} className="w-full font-bold text-gray-800 border-b mb-2 pb-1 outline-none text-sm" placeholder="景點名稱" />
                                                <textarea rows="3" value={spot.desc} onChange={e=>updateDaySpot(dIdx, sIdx, 'desc', e.target.value)} className="w-full text-xs text-gray-500 outline-none resize-none" placeholder="景點介紹"></textarea>
                                                <button onClick={()=>removeSpot(dIdx, sIdx)} className="absolute top-2 right-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fas fa-trash"></i></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 text-xs mb-2">
                                        <input value={day.hotel} onChange={e=>updateDay(dIdx, 'hotel', e.target.value)} className="flex-1 border p-1 rounded font-bold" placeholder="住宿飯店" />
                                        <input value={day.hotelTel} onChange={e=>updateDay(dIdx, 'hotelTel', e.target.value)} className="w-24 border p-1 rounded" placeholder="電話" />
                                    </div>
                                    <div className="flex gap-2 text-xs">
                                        <input value={day.hotelAddress} onChange={e=>updateDay(dIdx, 'hotelAddress', e.target.value)} className="flex-1 border p-1 rounded" placeholder="飯店地址 (輸入後才會顯示司機卡)" />
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="text-center mb-6 mt-4">
                            <button onClick={addDay} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-lg border-2 border-dashed border-gray-400 w-full transition-colors">
                                <i className="fas fa-plus-circle mr-1"></i> 新增一天行程 (Day {data.days.length + 1})
                            </button>
                        </div>

                        <button onClick={download} className="w-full mt-8 bg-kr-blue hover:bg-blue-800 text-white py-4 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95">
                            <i class="fas fa-download mr-2"></i> 匯出客戶端網頁 (HTML)
                        </button>
                    </div>

                    <div className="w-1/2 bg-gray-200 flex flex-col h-screen">
                        {/* Right Tabs */}
                        <div className="flex border-b bg-white">
                            <button 
                                className={`flex-1 py-3 font-bold text-sm ${rightTab === 'preview' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500'}`}
                                onClick={() => setRightTab('preview')}
                            >
                                <i className="fas fa-mobile-alt mr-2"></i> 即時預覽
                            </button>
                            <button 
                                className={`flex-1 py-3 font-bold text-sm ${rightTab === 'pdf' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500'}`}
                                onClick={() => setRightTab('pdf')}
                            >
                                <i className="fas fa-file-pdf mr-2"></i> PDF 來源
                            </button>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 overflow-hidden relative bg-gray-200">
                            {rightTab === 'preview' && (
                                <div className="w-full h-full flex items-center justify-center p-4">
                                    <div className="phone-frame w-[375px] h-[750px] shadow-2xl relative bg-white scale-90 sm:scale-100 transition-transform origin-center">
                                        <div className="phone-notch"></div>
                                        <iframe srcDoc={getClientHtml(data)} className="w-full h-full border-none rounded-[2rem]"></iframe>
                                    </div>
                                </div>
                            )}

                            {rightTab === 'pdf' && (
                                <div className="w-full h-full p-4">
                                    {pdfUrl ? (
                                        <iframe src={pdfUrl} className="w-full h-full rounded-xl shadow-lg border bg-white"></iframe>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-gray-400">
                                            <i className="fas fa-file-pdf text-6xl mb-4 opacity-30"></i>
                                            <p>尚未上傳說明會資料</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GeneratorApp />);
    </script>
</body>
</html>
